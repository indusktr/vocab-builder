<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocab Builder Hub</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="container">
    <h1>My Vocab Builder Hub</h1>
    <p class="subtitle">Highlight words on any webpage and save them here to expand your vocabulary.</p>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search words..." aria-label="Search words">
      <select id="sort" aria-label="Sort words">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="alphabetical">Alphabetical</option>
      </select>
    </div>
    <div id="word-list" class="grid">
      </div>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
